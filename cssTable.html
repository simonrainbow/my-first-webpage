<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>cssTable</title>
    <style>
       
        table {
            border-collapse: collapse;
            width: 300px;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: left;
        }

        .header-row {
            background-color: gray;
            color: white;
        }

        .yellow-row {
            background-color: yellow;
        }

  
        .fixed-box {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 150px;
            height: 120px;
            border: 3px solid green; /* 綠色邊框 */
            padding: 10px;
            background-color: white;
        }
    </style>
</head>
<body>

    <table>
        <tr class="header-row">
            <th>Firstname</th>
            <th>Lastname</th>
        </tr>
        
        <tr class="yellow-row">
            <td>莊</td>
            <td>鎧鴻</td>
        </tr>
        
        <tr>
            <td>2</td>
            <td>2</td>
        </tr>
        
        <tr class="yellow-row">
            <td>3</td>
            <td>3</td>
        </tr>
    </table>

    <div class="fixed-box">
        This div element has position: fixed;
    </div>

</body>
</html>
