<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Page Assignment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            height: 2000px;
            padding: 20px;
        }

  
        table {
            border-collapse: collapse;
            width: 300px;
            text-align: left;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
        }

        th {
            background-color: #666666;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #FFFF00;
        }

    
        tr:nth-child(odd) {
            background-color: #FFFFFF;
        }

        
        .fixed-box {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            border: 3px solid rgb(4, 152, 4); 
            padding: 10px;
            background-color: white;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>Firstname</th>
                <th>Lastname</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>莊</td>
                <td>鎧鴻</td>
            </tr>
            <tr>
                <td>2</td>
                <td>2</td>
            </tr>
            <tr>
                <td>3</td>
                <td>3</td>
            </tr>
        </tbody>
    </table>

    <div class="fixed-box">
        This div element has position: fixed;
    </div>

</body>
</html>
