<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>webExercise18</title>
    <style>
        body {
            font-family: serif;
            padding: 20px;
        }

        .heading-1 {
            display: inline-block;
            border-top: 3px solid black;
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 20px;

            text-shadow: 2px 2px 2px pink, -2px -2px 2px pink, 2px -2px 2px pink, -2px 2px 2px pink;
        }

        .heading-2 {
            border: 3px solid yellow;
            padding: 5px;
            font-size: 28px;
            font-style: italic;
            margin-bottom: 20px;
            display: block;
        }

       
        .heading-3 {
            text-align: right;
            font-size: 24px;
            text-decoration: underline;
            font-weight: bold;
            display: block;
        }
    </style>
</head>
<body>

    <div class="heading-1">This is heading 1</div>

    <div class="heading-2">This is heading 2</div>

    <div class="heading-3">This is heading 3</div>

</body>
</html>
