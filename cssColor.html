<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>網頁作業 - Hello World</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 50px;
            background-color: #f0f0f0;
        }

        .box {
            font-size: 40px;
            font-weight: bold;
            padding: 10px 20px;
        }

        /* 第一個：雙層邊框與淺藍背景 */
        .box-1 {
            background-color: #add8e6; /* 淺藍色 */
            border: 8px double #ff6347; /* 橘紅色雙線邊框 */
            color: black;
        }

        /* 第二個：圓角、藍色邊框與黃色背景 */
        .box-2 {
            background-color: #ffff00;
            border: 4px solid #1e90ff;
            border-radius: 20px;       
            color: black;
        }

        /* 第三個：虛線邊框與綠色背景 */
        .box-3 {
            background-color: #3cb371; 
            border: 8px dotted #808080; 
            color: black;
        }
    </style>
</head>
<body>

    <div class="box box-1">Hello World</div>
    <div class="box box-2">Hello World</div>
    <div class="box box-3">Hello World</div>

</body>
</html>
