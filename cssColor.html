<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>cssColor</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 50px;
            background-color: rgb(255, 255, 255)
        }

        .box {
            font-size: 40px;
            font-weight: bold;
            padding: 10px 20px;
        }

                           
        .box-1 {
            background-color: rgb(134, 190, 218); 
            border: 8px double rgb(219, 102, 30); 
            color: black;
        }

        .box-2 {
            background-color: yellow;
            border: 4px solid rgb(50, 137, 224);
            border-radius: 20px;       
            color: black;
        }

        .box-3 {
            background-color: rgb(30, 145, 30); 
            border: 8px dotted gray; 
            color: black;
        }
    </style>
</head>
<body>

    <div class="box box-1">Hello World</div>
    <div class="box box-2">Hello World</div>
    <div class="box box-3">Hello World</div>

</body>
</html>
