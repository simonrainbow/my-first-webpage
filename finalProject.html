<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-color: #f4f4f4; /* 終末地標誌性的工業淺灰白 */
            --text-main: #1a1a1a;
            --accent-yellow: #ffcf00; /* 亮黃點綴 */
            --line-color: #d1d1d1;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            display: grid;
            grid-template-columns: 80px 1fr 300px; /* 三欄式佈局 */
            height: 100vh;
            overflow: hidden;
        }

        /* 裝飾性網格背景 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(#d1d1d1 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        /* 左側邊欄 */
        .sidebar {
            border-right: 1px solid var(--line-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            font-size: 10px;
            letter-spacing: 1px;
            writing-mode: vertical-rl;
            color: #888;
        }

        /* 中央主要區域 */
        .main-content {
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .project-tag {
            background: var(--text-main);
            color: #fff;
            display: inline-block;
            padding: 2px 10px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 80px;
            margin: 0;
            line-height: 0.9;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* 右側面板 */
        .panel {
            background: #fff;
            border-left: 1px solid var(--line-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .data-card {
            border: 1px solid var(--line-color);
            padding: 15px;
        }

        .data-card .label {
            font-size: 11px;
            color: #999;
            border-bottom: 1px solid #eee;
            margin-bottom: 10px;
            padding-bottom: 5px;
        }

        .btn-action {
            background: var(--text-main);
            color: #fff;
            border: none;
            padding: 15px;
            text-align: left;
            cursor: pointer;
            position: relative;
            transition: 0.3s;
        }

        .btn-action:hover {
            background: var(--accent-yellow);
            color: #000;
        }

        /* 終末地風格的角落裝飾 */
        .corner-deco {
            position: absolute;
            bottom: 40px;
            left: 40px;
            font-size: 12px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        STATION_DATA_TRANSMISSION // AUTO_MODE_ENABLED // SECURE_LINE
    </aside>

    <main class="main-content">
        <div>
            <div class="project-tag">SDG 13 // CLIMATE ACTION</div>
            <h1>PROTECT<br>THE PLANT</h1>
            <p style="max-width: 400px; color: #666; margin-top: 20px; line-height: 1.6;">
                大氣循環修復協議已啟動。監控範圍：全域。當前目標：實現低碳能源轉型與工業廢物回收。
            </p>
        </div>
        
        <div class="corner-deco">
            [ COORDINATES: 35.6895° N, 139.6917° E ] <br>
            VERSION: 1.0.4_STABLE
        </div>
    </main>

    <section class="panel">
        <div class="data-card">
            <div class="label">ATMOSPHERIC STABILITY</div>
            <div style="font-size: 24px; font-weight: bold;">88.42%</div>
        </div>
        <div class="data-card">
            <div class="label">CARBON_CAPTURE_RATE</div>
            <div style="font-size: 24px; font-weight: bold; color: var(--accent-yellow);">ACTIVE</div>
        </div>
        
        <div style="flex-grow: 1;"></div>

        <button class="btn-action">
            INITIATE RECOVERY <br>
            <span style="font-size: 10px; opacity: 0.7;">啟動修復程序</span>
        </button>
        <button class="btn-action" style="background: #eee; color: #000;">
            SYSTEM LOGS <br>
            <span style="font-size: 10px; opacity: 0.7;">系統紀錄檔案</span>
        </button>
    </section>

</body>
</html>
