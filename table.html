<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
    <style>
    table{
        border-collapse: collapse;
        }

        th,td{
            border: 1px solid black;
            padding: 5px;
            text-align: left;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Name</th>
            <th>Student ID</th>
        </tr>

        <tr>
            <td>
                莊鎧鴻
            </td>
            <td>
                113403524
            </td>
        </tr>
    </table>
    
</body>
</html>
